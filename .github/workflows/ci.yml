name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Format check
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy check
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml

  native-e2e:
    name: Native E2E Tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Install Chrome
        run: cargo run --manifest-path cli/Cargo.toml -- install --with-deps

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run e2e tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml e2e -- --ignored --test-threads=1
