name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Format check
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy check
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml

  rust-cross:
    name: Rust (${{ matrix.target }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Run Rust tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

  native-e2e:
    name: Native E2E Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Install Chrome
        run: |
          cargo run --manifest-path cli/Cargo.toml -- install --with-deps

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run e2e tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml e2e -- --ignored --test-threads=1

  smoke-test:
    name: Smoke test binary
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: Smoke test
        run: cli/target/release/agent-browser --version
